<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Universidades Aliadas</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      background: #ffffff;
    }

    /* ── Título ── */
    .section-title {
      text-align: center;
      padding: 0 1rem 0.6rem;
      flex-shrink: 0;
    }

    .section-title h2 {
      font-family: 'Merriweather', Georgia, 'Times New Roman', serif;
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 700;
      color: #1a2a3a;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .section-title .title-line {
      display: block;
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #1a2a3a, #4a7ab5);
      border-radius: 2px;
      margin: 0.5rem auto 0;
    }

    /* ── Carruseles ── */
    .carousels-group {
      display: flex;
      flex-direction: column;
      gap: 14vh;
    }

    .carousel-wrapper {
      height: 38vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
      background: #ffffff;
    }

    /* Línea divisoria mejorada: más separación en desktop */
    .carousel-wrapper::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 12%; 
      right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.22) 20%, rgba(0,0,0,0.22) 80%, transparent);
      box-shadow: 0 12px 28px -8px rgba(0,0,0,0.35);
      pointer-events: none;
      z-index: 5;
      transition: all 0.2s ease;
    }
    
    /* Desktop: separación extra del primer carrusel respecto a su línea */
    @media (min-width: 1025px) {
      .carousel-wrapper:first-child {
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
      }
      .carousel-wrapper:first-child::after {
        bottom: -0.5rem;
        box-shadow: 0 16px 32px -10px rgba(0,0,0,0.4);
      }
      .carousel-wrapper {
        height: 38vh;
      }
    }

    .carousel-wrapper:last-child::after { 
      display: none; 
    }

    .scene {
      width: 100%;
      max-width: 1400px;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      perspective: 40em;
    }

    .a3d {
      display: grid;
      place-self: center;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      animation: ry 27s linear infinite;
      will-change: transform;
      grid-area: 1 / 1;
    }

    @keyframes ry {
      0%   { rotate: y 0deg; }
      100% { rotate: y 360deg; }
    }

    .card {
      --w: 14em;
      --ba: 1turn / var(--n);
      grid-area: 1 / 1;
      width: var(--w);
      aspect-ratio: 2 / 3;
      border-radius: 1.2em;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      /* ─── BOX-SHADOW MEJORADO PARA RESALTAR 3D ─── */
      box-shadow:
        0 35px 55px -20px rgba(0,0,0,0.6),
        0 15px 30px -12px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.95),
        0 0 0 3px rgba(0,0,0,0.12),
        inset 0 2px 4px rgba(255,255,255,0.3);
      transition: filter 0.25s ease, transform 0.25s cubic-bezier(0.2,0.9,0.4,1.1);
      cursor: pointer;
      will-change: transform;
      overflow: hidden;
      background: #fff;
      transform-style: flat;
      -webkit-transform-style: flat;
      transform:
        rotatey(calc(var(--i) * var(--ba)))
        translatez(calc(-1 * (0.5 * var(--w) + 0.5em) / tan(0.5 * var(--ba))));
      position: relative;
    }

    .card img {
      position: absolute;
      top: -8%;
      left: -15%;
      width: 130%;
      height: 116%;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: 0;
    }

    @media (hover: hover) {
      .card:hover {
        filter: brightness(1.05) contrast(1.05);
        transform:
          rotatey(calc(var(--i) * var(--ba)))
          translatez(calc(-1 * (0.5 * var(--w) + 0.5em) / tan(0.5 * var(--ba))))
          scale(1.08);
        z-index: 100;
        /* Sombra aún más intensa al hacer hover */
        box-shadow:
          0 45px 70px -22px rgba(0,0,0,0.75),
          0 20px 35px -15px rgba(0,0,0,0.6),
          0 0 0 2px rgba(255,255,255,1),
          0 0 0 5px rgba(56,189,248,0.4);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .a3d { animation-duration: 120s !important; }
    }

    /* ═══════ DESKTOP: Velocidad reducida + tarjetas más cuadradas (menos altura) ══════ */
    @media (min-width: 1025px) {
      .a3d {
        animation-duration: 34s !important;
      }
      
      .carousels-group {
        gap: 10vh;
      }
      
      .carousel-wrapper:first-child {
        margin-bottom: 0.8rem;
        padding-bottom: 0.6rem;
      }
      
      /* ─── TARJETAS MÁS BAJAS / CUADRADAS CON UN POCO MÁS DE ANCHO ─── */
      .card {
        --w: 13.8em;
        aspect-ratio: 4 / 5;
        border-radius: 0.9em;
      }
      
      /* ─── ZOOM LIGERAMENTE AUMENTADO EN LAS IMÁGENES ─── */
      .card img {
        top: -10%;      /* Más zoom: de -5% a -10% */
        left: -12%;     /* Más zoom: de -10% a -12% */
        width: 124%;    /* Más zoom: de 120% a 124% */
        height: 114%;   /* Más zoom: de 110% a 114% */
      }
      
      /* Sombra extra en desktop para resaltar */
      .card {
        box-shadow:
          0 40px 60px -22px rgba(0,0,0,0.65),
          0 18px 32px -14px rgba(0,0,0,0.55),
          0 0 0 1px rgba(255,255,255,0.95),
          0 0 0 3px rgba(0,0,0,0.15),
          inset 0 2px 5px rgba(255,255,255,0.35);
      }
    }

    /* ═══════ DESKTOP GRANDE (pantallas muy anchas) ══════ */
    @media (min-width: 1440px) {
      .card {
        --w: 14.2em;
        aspect-ratio: 5 / 6;
      }
    }

    /* ═══════ MOBILE ══════ */
    @media (max-width: 800px) {
      .section-title h2 { font-size: clamp(1.1rem, 4vw, 1.5rem); }
      .carousels-group { gap: 0; }
      .carousel-wrapper { height: 36vh; }
      .carousel-wrapper:first-child::after {
        bottom: 0;
        box-shadow: 0 12px 28px -8px rgba(0,0,0,0.35);
      }
      .card  { --w: 14.5em; aspect-ratio: 2 / 3; }
      .scene { perspective: 34em; }
    }

    @media (max-width: 600px) {
      .carousels-group { gap: 0; }
      .carousel-wrapper { height: 34vh; }
      .card  { --w: 14em; }
      .scene { perspective: 30em; }
    }

    @media (max-width: 480px) {
      .carousels-group { gap: 0; }
      .carousel-wrapper { height: 32vh; }
      .card  { --w: 13em; }
      .scene { perspective: 26em; }
    }

    @media (max-width: 360px) {
      .carousels-group { gap: 0; }
      .carousel-wrapper { height: 30vh; }
      .card  { --w: 11.5em; }
      .scene { perspective: 22em; }
    }
  </style>
</head>
<body>
